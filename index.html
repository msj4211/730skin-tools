<!DOCTYPE html>
<html lang="ko">
<head><script async src="https://www.googletagmanager.com/gtag/js?id=G-GG2SP7JBVY"></script>
<script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>730스킨 이어밸런스 체크 결과지</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: #F7F3EC;
    color: #2E2A26;
    margin: 0;
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; position: relative; }
  .home-link {
    position: absolute; top: 0; left: 0;
    font-size: 15px; font-weight: 700; color: #2E2A26;
    text-decoration: none; letter-spacing: 0.5px;
  }
  .home-link:hover { color: #B08D57; }
  header { text-align: center; margin-bottom: 24px; }
  header .sub { color: #B08D57; font-size: 13px; letter-spacing: 1px; margin-bottom: 4px; }
  header h1 { font-size: 22px; margin: 0 0 8px; color: #2E2A26; }
  header p { font-size: 13px; color: #8A8378; margin: 0; }

  .info-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .info-row div { flex: 1; min-width: 140px; }
  .info-row label { display: block; font-size: 12px; color: #8A8378; margin-bottom: 4px; }
  .info-row input {
    width: 100%; padding: 8px 10px; border: 1px solid #DDD5C7; border-radius: 6px;
    font-size: 14px; background: #fff; font-family: inherit;
  }

  .toggle-row {
    display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #6B6559;
    background: #fff; border: 1px solid #E6DFD2; border-radius: 8px; padding: 10px 14px;
    margin-bottom: 14px; cursor: pointer; width: fit-content;
  }
  .toggle-row input { width: 16px; height: 16px; cursor: pointer; }

  .domain { background: #fff; border: 1px solid #E6DFD2; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .domain h2 { font-size: 14px; font-weight: 700; color: #7A5C3E; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid #EFE8DB; }

  .item-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; flex-wrap: wrap; }
  .item-label { font-size: 13.5px; color: #3A3530; flex: 1 1 200px; }
  .btn-group { display: flex; gap: 4px; flex-shrink: 0; }
  .opt-btn {
    border: 1px solid #DDD5C7; background: #FBF8F2; color: #8A8378;
    font-size: 11px; padding: 6px 8px; border-radius: 6px; cursor: pointer;
    font-family: inherit; white-space: nowrap; transition: all .15s;
  }
  .opt-btn:hover { background: #F0E9DA; }
  .opt-btn.active {
    background: #C0714A; border-color: #C0714A; color: #fff; font-weight: 700;
  }

  .calc-btn {
    width: 100%; padding: 14px; margin: 24px 0; font-size: 15px; font-weight: 700;
    background: #2E2A26; color: #F7F3EC; border: none; border-radius: 10px; cursor: pointer;
  }
  .calc-btn:active { transform: scale(0.99); }

  footer { text-align: center; font-size: 11px; color: #B0A896; margin-top: 30px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="https://msj4211.github.io/0723/" class="home-link">730</a>
  <header>
    <div class="sub">730스킨 이어테라피</div>
    <h1>이어밸런스 체크 결과지</h1>
    <p>지난 한 주 동안의 경험에 해당하는 정도를 선택해주세요</p>
  </header>

  <div class="info-row">
    <div><label>이름</label><input type="text" id="name" placeholder="이름"></div>
    <div><label>나이</label><input type="text" id="age" placeholder="나이"></div>
    <div><label>상담 날짜</label><input type="date" id="date"></div>
  </div>

  <label class="toggle-row">
    <input type="checkbox" id="menstrual-toggle">
    생리 전 또는 생리 중이신가요?
  </label>

  <div id="form-area"></div>

  <button class="calc-btn" id="calc-btn" type="button">결과 확인하기</button>

  <footer>730스킨 이어테라피</footer>
</div>

<script>
var OPTS = ['없음','보통','높음'];
var MAX_SCORE = OPTS.length - 1; // 최고 점수 (현재 2)
var TIER_LOW = MAX_SCORE / 3;      // 안정 ↔ 관찰 필요 경계
var TIER_HIGH = MAX_SCORE * 2 / 3; // 관찰 필요 ↔ 집중 케어 경계

var DOMAINS = [
  { key:'sleep', label:'수면 밸런스', items:[
    [1,'밤에 잠들기 어려움'],[2,'밤에 잠을 유지하기 어려움(자다가 깸)'],[3,'낮 동안 피곤하거나 무기력함']
  ]},
  { key:'vitality', label:'활력·정서 자원', reverse:true, items:[
    [4,'활력과 에너지가 넘침'],[6,'기분이 좋고 행복하며 신남'],[7,'즐거운 활동에 시간을 할애함'],
    [8,'함께 있고 싶은 사람들과 어울림'],[9,'자신감이 있거나 낙관적임'],[10,'생산적으로 일할 수 있음']
  ]},
  { key:'tension', label:'신체 긴장·통증', items:[
    [12,'두통'],[13,'어깨 긴장 또는 목 뻣뻣함'],[14,'손·발·팔·다리의 통증이나 뻣뻣함'],[15,'요통']
  ]},
  { key:'autonomic', label:'자율신경 반응', items:[
    [16,'가슴 통증·압박감'],[20,'기침 또는 호흡 곤란'],[21,'심장이 빠르게 뛰거나 두근거림'],
    [22,'손발이 참'],[23,'운동·외부 열과 무관한 땀'],[24,'떨림 또는 몸이 흔들림'],
    [25,'어지럽거나 힘 없거나 실신할 것 같음'],[26,'몸이 아프거나 컨디션이 나쁨'],[27,'인후통 또는 림프절 부음']
  ]},
  { key:'digestion', label:'소화·식욕 신호', items:[
    [17,'복통 또는 복부 불편감'],[18,'메스꺼움 또는 구토'],[19,'변비, 설사 또는 가스'],
    [28,'식욕부진 또는 소식'],[29,'과식 또는 폭식']
  ]},
  { key:'emotion', label:'정서적 부담', items:[
    [5,'초조하거나 긴장되거나 안절부절 못함'],[11,'해야 할 일 때문에 시간에 쫓김'],[30,'신경이 예민하거나 불안함'],
    [31,'걱정되거나 염려됨'],[32,'집중이나 결정을 내리기 어려움'],[33,'부적절하거나 무가치하게 느껴짐'],
    [34,'우울하거나 낙담됨'],[35,'외롭거나 고립되거나 위축됨'],[36,'짜증나거나 화나거나 분함'],
    [37,'멈출 수 없는 자기비판적 생각'],[38,'특정 물질(술·약물·니코틴)이 갈망됨']
  ]},
  { key:'selfcare', label:'자기관리 자원', protective:true, items:[
    [39,'신체 운동이나 스포츠 활동을 함'],[40,'눈을 감고 하는 이완이나 명상을 함']
  ]},
  { key:'menstrual', label:'생리·월경 관련 증상', conditional:true, items:[
    [41,'생리 전 유방 압통·팽만감'],[42,'생리 전 감정 기복(예민함·눈물 많아짐)'],[43,'생리 전·중 두통 또는 편두통'],
    [44,'하복부 통증(생리통)'],[45,'요통 또는 골반 불편감'],[46,'생리 전·중 부종(붓기)'],
    [47,'생리 전 식욕 변화(과식·단 것 당김)'],[48,'생리 전·중 피부 트러블'],[49,'생리 주기 전반의 피로감 증가'],
    [50,'생리 불순(주기가 불규칙함)']
  ]}
];

var NOTES = {
  sleep: ['수면 밸런스가 안정적이에요.', '가벼운 수면 신호가 보여요. 저녁 루틴 케어를 권장해요.', '밤에도 마음이 쉬지 못하는 유형이에요. 신문혈·심혈 중심 케어를 권장해요.'],
  vitality: ['활력과 정서 자원이 좋은 편이에요.', '활력이 조금 저하된 신호가 있어요.', '에너지와 의욕이 많이 떨어진 상태예요. 활력 회복 케어를 우선해보세요.'],
  tension: ['신체 긴장이 안정적이에요.', '가벼운 근골격 긴장 신호가 있어요.', '몸이 늘 긴장 모드인 유형이에요. 어깨·목 반사구 집중 케어를 권장해요.'],
  autonomic: ['자율신경 균형이 안정적이에요.', '자율신경 신호가 간간이 나타나요.', '자율신경이 예민해진 유형이에요. 이주·미주신경 반사구를 우선해보세요.'],
  digestion: ['소화·식욕이 안정적이에요.', '소화 컨디션에 가벼운 신호가 있어요.', '소화 기능에 부담이 큰 유형이에요. 위·비 반사구 케어를 병행해보세요.'],
  emotion: ['정서적으로 안정된 상태예요.', '정서적으로 조금 지쳐있는 신호가 있어요.', '마음의 무게를 혼자 견뎌온 유형이에요. 정서 이완 케어와 함께, 필요하다면 전문 상담도 함께 권해보세요.'],
  menstrual: ['생리 전후 컨디션이 안정적이에요.', '생리 전후로 가벼운 신호가 나타나는 편이에요.', '생리 전후 증상이 크게 나타나는 유형이에요. 자궁·내분비 반사구 중심 케어를 권장해요.']
};

var TIER_LABELS = ['안정', '관찰 필요', '집중 케어'];
var TIER_CLASSES = ['tier-stable', 'tier-watch', 'tier-focus'];
var PROTECTIVE_LABELS = ['부족', '보통', '좋음'];
var PROTECTIVE_CLASSES = ['tier-focus', 'tier-watch', 'tier-stable'];
var PROTECTIVE_NOTES = [
  '쉬고 이완하는 시간이 부족해요. 자기관리 루틴을 함께 만들어봐요.',
  '자기관리 습관이 있어요. 조금 더 늘려보면 좋아요.',
  '스스로 회복하는 힘이 좋아요. 이 습관을 계속 이어가시면 좋아요.'
];

var answers = {};

function buildForm() {
  var formArea = document.getElementById('form-area');
  DOMAINS.forEach(function(d) {
    var section = document.createElement('div');
    section.className = 'domain';
    var h = document.createElement('h2');
    h.textContent = d.label;
    section.appendChild(h);

    d.items.forEach(function(pair) {
      var itemId = pair[0];
      var text = pair[1];
      answers[itemId] = 0;

      var row = document.createElement('div');
      row.className = 'item-row';

      var label = document.createElement('div');
      label.className = 'item-label';
      label.textContent = text;
      row.appendChild(label);

      var btnGroup = document.createElement('div');
      btnGroup.className = 'btn-group';
      btnGroup.setAttribute('data-item', itemId);

      OPTS.forEach(function(optText, idx) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'opt-btn';
        btn.textContent = optText;
        if (idx === 0) btn.classList.add('active');
        btn.addEventListener('click', function() {
          answers[itemId] = idx;
          var siblings = btnGroup.querySelectorAll('.opt-btn');
          for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('active');
          btn.classList.add('active');
        });
        btnGroup.appendChild(btn);
      });

      row.appendChild(btnGroup);
      section.appendChild(row);
    });

    if (d.conditional) {
      section.id = 'domain-' + d.key;
      section.style.display = 'none';
    }

    formArea.appendChild(section);
  });

  var menstrualToggle = document.getElementById('menstrual-toggle');
  if (menstrualToggle) {
    menstrualToggle.addEventListener('change', function() {
      var section = document.getElementById('domain-menstrual');
      if (section) section.style.display = menstrualToggle.checked ? 'block' : 'none';
    });
  }
}

function getTierIndex(avg) {
  if (avg <= TIER_LOW) return 0;
  if (avg <= TIER_HIGH) return 1;
  return 2;
}

function calculate() {
  var menstrualChecked = document.getElementById('menstrual-toggle').checked;
  var resultsData = [];

  DOMAINS.forEach(function(d) {
    if (d.conditional && !menstrualChecked) return;

    var sum = 0;
    d.items.forEach(function(pair) { sum += answers[pair[0]]; });
    var avg = sum / d.items.length;
    if (d.reverse) avg = MAX_SCORE - avg;
    avg = Math.round(avg * 10) / 10;

    var tierIdx, tierLabel, tierClass, note;
    if (d.protective) {
      tierIdx = avg >= TIER_HIGH ? 2 : (avg >= TIER_LOW ? 1 : 0);
      tierLabel = PROTECTIVE_LABELS[tierIdx];
      tierClass = PROTECTIVE_CLASSES[tierIdx];
      note = PROTECTIVE_NOTES[tierIdx];
    } else {
      tierIdx = getTierIndex(avg);
      tierLabel = TIER_LABELS[tierIdx];
      tierClass = TIER_CLASSES[tierIdx];
      note = NOTES[d.key][tierIdx];
    }

    resultsData.push({ label: d.label, avg: avg, max: MAX_SCORE, tierLabel: tierLabel, tierClass: tierClass, note: note });
  });

  var payload = {
    name: document.getElementById('name').value,
    age: document.getElementById('age').value,
    date: document.getElementById('date').value,
    results: resultsData
  };
  sessionStorage.setItem('earCheckResult', JSON.stringify(payload));
  location.href = 'result.html';
}

buildForm();
document.getElementById('calc-btn').addEventListener('click', calculate);
</script><script>
document.getElementById('calc-btn').addEventListener('click', function() {
  gtag('event', 'check_complete', {
    event_category: 'engagement',
    event_label: '결과확인버튼클릭'
  });
});
</script>
</body>
</html>
