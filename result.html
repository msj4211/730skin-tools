<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>730스킨 이어밸런스 체크 결과지</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: #F7F3EC;
    color: #2E2A26;
    margin: 0;
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; position: relative; }
  .home-link {
    position: absolute; top: 0; left: 0;
    font-size: 15px; font-weight: 700; color: #2E2A26;
    text-decoration: none; letter-spacing: 0.5px;
  }
  .home-link:hover { color: #B08D57; }
  header { text-align: center; margin-bottom: 24px; }
  header .sub { color: #B08D57; font-size: 13px; letter-spacing: 1px; margin-bottom: 4px; }
  header h1 { font-size: 22px; margin: 0 0 8px; color: #2E2A26; }
  header p { font-size: 13px; color: #8A8378; margin: 0; }

  .info-summary {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    background: #fff; border: 1px solid #E6DFD2; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px; font-size: 13.5px; color: #6B6559;
  }
  .info-summary span b { color: #2E2A26; }

  .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
  .result-card { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid #E6DFD2; }
  .result-card .rc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .result-card .rc-name { font-size: 13px; font-weight: 700; color: #2E2A26; }
  .result-card .rc-tier { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .result-card .rc-score { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .result-card .rc-score span { font-size: 12px; font-weight: 400; color: #8A8378; }
  .result-card .rc-note { font-size: 12.5px; color: #6B6559; line-height: 1.55; }

  .tier-stable { background: #E5EEE1; color: #4B6E3F; }
  .tier-watch { background: #FBEED9; color: #A0722C; }
  .tier-focus { background: #F6DFD5; color: #B04B2A; }

  .action-row { display: flex; gap: 8px; margin-top: 16px; }
  .print-btn, .back-btn {
    display: block; width: 100%; text-align: center; padding: 10px;
    background: #fff; border: 1px solid #DDD5C7; border-radius: 8px; color: #6B6559;
    font-size: 13px; cursor: pointer; font-family: inherit; text-decoration: none;
  }
  .print-btn { background: #2E2A26; color: #F7F3EC; border-color: #2E2A26; font-weight: 700; }

  .empty-state { text-align: center; color: #8A8378; font-size: 14px; margin-top: 60px; }
  .empty-state a { color: #B08D57; }

  footer { text-align: center; font-size: 11px; color: #B0A896; margin-top: 30px; }

  @media print {
    .action-row, .home-link { display: none; }
    body { background: #fff; }
  }
</style>
</head>
<body>
<div class="wrap">
  <a href="https://msj4211.github.io/0723/" class="home-link">730</a>
  <header>
    <div class="sub">730스킨 이어테라피</div>
    <h1>이어밸런스 체크 결과지</h1>
    <p>지난 한 주 동안의 경험을 바탕으로 한 결과입니다</p>
  </header>

  <div id="content"></div>

  <footer>730스킨 이어테라피</footer>
</div>

<script>
var raw = sessionStorage.getItem('earCheckResult');
var contentEl = document.getElementById('content');

if (!raw) {
  contentEl.innerHTML =
    '<div class="empty-state">결과 데이터를 찾을 수 없어요.<br>' +
    '<a href="index.html">체크리스트로 돌아가서 먼저 진행해주세요.</a></div>';
} else {
  var data = JSON.parse(raw);

  var summary = document.createElement('div');
  summary.className = 'info-summary';
  var parts = [];
  if (data.name) parts.push('<span>이름: <b>' + data.name + '</b></span>');
  if (data.age) parts.push('<span>나이: <b>' + data.age + '</b></span>');
  if (data.date) parts.push('<span>상담 날짜: <b>' + data.date + '</b></span>');
  summary.innerHTML = parts.join('');
  if (parts.length) contentEl.appendChild(summary);

  var grid = document.createElement('div');
  grid.className = 'result-grid';
  data.results.forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML =
      '<div class="rc-top">' +
        '<span class="rc-name">' + r.label + '</span>' +
        '<span class="rc-tier ' + r.tierClass + '">' + r.tierLabel + '</span>' +
      '</div>' +
      '<div class="rc-score">' + r.avg + ' <span>/ ' + r.max + '</span></div>' +
      '<div class="rc-note">' + r.note + '</div>';
    grid.appendChild(card);
  });
  contentEl.appendChild(grid);

  var actionRow = document.createElement('div');
  actionRow.className = 'action-row';

  var printBtn = document.createElement('button');
  printBtn.className = 'print-btn';
  printBtn.type = 'button';
  printBtn.textContent = '결과지 인쇄 / PDF 저장';
  printBtn.addEventListener('click', function() { window.print(); });
  actionRow.appendChild(printBtn);

  var backLink = document.createElement('a');
  backLink.className = 'back-btn';
  backLink.href = 'index.html';
  backLink.textContent = '체크리스트로 돌아가기';
  actionRow.appendChild(backLink);

  contentEl.appendChild(actionRow);
}
</script>
</body>
</html>
