<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>730스킨 이어리플렉서 줌교육 신청</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GG2SP7JBVY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GG2SP7JBVY');
</script>
<style>
  :root{
    --ivory:#F7F3EC;
    --terracotta:#C1694B;
    --sage:#7C8C6E;
    --gold:#B9964A;
    --ink:#2B2823;
    --ink-soft:#585349;
    --card:#FFFFFF;
    --line:#E7E0D2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ivory);
    color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 60px;
  }
  .wrap{ width:100%; max-width:440px; }
  .brandmark{ text-align:center; margin-bottom:22px; }
  .brandmark .name{ font-size:13px; letter-spacing:0.32em; color:var(--sage); font-weight:600; text-transform:uppercase; }
  .brandmark .sub{ margin-top:6px; font-size:11px; color:var(--ink-soft); letter-spacing:0.08em; }
  .card{ background:var(--card); border-radius:18px; border:1px solid var(--line); padding:34px 26px 28px; box-shadow:0 18px 40px -22px rgba(43,40,35,0.25); }
  h1{ font-size:21px; line-height:1.45; margin:0 0 8px; font-weight:700; color:var(--ink); }
  h1 em{ font-style:normal; color:var(--terracotta); }
  .desc{ font-size:13.5px; line-height:1.7; color:var(--ink-soft); margin:0 0 26px; }
  .field{margin-bottom:20px;}
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:8px; }
  .field .req{color:var(--terracotta);}
  input[type=text], input[type=tel]{
    width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:10px;
    font-size:15px; background:#FDFCFA; color:var(--ink); outline:none; transition:border-color .15s ease;
  }
  input[type=text]:focus, input[type=tel]:focus{ border-color:var(--sage); }
  .chip-group{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ position:relative; }
  .chip input{ position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer; }
  .chip span{
    display:inline-block; padding:9px 14px; border-radius:999px; border:1px solid var(--line);
    font-size:13px; color:var(--ink-soft); background:#FDFCFA; transition:all .15s ease;
  }
  .chip input:checked + span{ background:var(--sage); border-color:var(--sage); color:#fff; font-weight:600; }
  .submit-btn{
    width:100%; margin-top:6px; padding:15px; border:none; border-radius:12px;
    background:var(--terracotta); color:#fff; font-size:15.5px; font-weight:700;
    letter-spacing:0.02em; cursor:pointer; transition:opacity .15s ease;
  }
  .submit-btn:disabled{opacity:0.55;cursor:default;}
  .submit-btn:active:not(:disabled){opacity:0.85;}
  .error-msg{ display:none; font-size:12.5px; color:var(--terracotta); margin-top:-10px; margin-bottom:16px; }
  .foot-note{ text-align:center; font-size:11px; color:#A79E8E; margin-top:18px; line-height:1.6; }
  .success{ display:none; text-align:center; }
  .success .mark{ width:56px;height:56px; margin:0 auto 18px; border-radius:50%; background:var(--sage); display:flex;align-items:center;justify-content:center; }
  .success .mark svg{width:26px;height:26px;}
  .success h2{ font-size:19px; margin:0 0 10px; }
  .success p{ font-size:13.5px; color:var(--ink-soft); line-height:1.7; margin:0 0 26px; }
  .kakao-btn{
    display:block; width:100%; padding:15px; border-radius:12px; background:#FFE812;
    color:#391B1B; font-weight:700; font-size:15.5px; text-decoration:none; box-sizing:border-box;
  }
  .gold-line{ width:36px;height:2px; background:var(--gold); margin:0 auto 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brandmark">
    <div class="name">730 Skin</div>
    <div class="sub">Ear Reflexer · Zoom Education</div>
  </div>
  <div class="card">
    <div id="form-state">
      <h1>이어리플렉서<br><em>줌 교육</em> 신청</h1>
      <p class="desc">신청서 작성 후 안내에 따라 카카오톡 단체방에 입장하시면<br>교육 일정과 자료를 순서대로 안내드립니다.</p>
      <form id="signup-form">
        <div class="field">
          <label>성함 <span class="req">*</span></label>
          <input type="text" id="f-name" placeholder="이름을 입력해주세요" autocomplete="name">
        </div>
        <div class="field">
          <label>연락처 <span class="req">*</span></label>
          <input type="tel" id="f-phone" placeholder="010-0000-0000" autocomplete="tel">
        </div>
        <div class="field">
          <label>참여 목적 <span class="req">*</span> <span style="font-weight:400;color:var(--ink-soft);">(중복 선택 가능)</span></label>
          <div class="chip-group" id="f-purpose">
            <label class="chip"><input type="checkbox" value="개인 학습"><span>개인 학습</span></label>
            <label class="chip"><input type="checkbox" value="원내 도입 검토"><span>원내 도입 검토</span></label>
            <label class="chip"><input type="checkbox" value="제품 구매 문의"><span>제품 구매 문의</span></label>
            <label class="chip"><input type="checkbox" value="기타"><span>기타</span></label>
          </div>
        </div>
        <div class="error-msg" id="error-msg">필수 항목을 모두 입력해주세요.</div>
        <button type="submit" class="submit-btn" id="submit-btn">신청 완료하기</button>
      </form>
      <div class="foot-note">입력하신 정보는 교육 안내 목적으로만 사용됩니다.</div>
    </div>
    <div class="success" id="success-state">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="gold-line"></div>
      <h2>신청이 완료되었습니다</h2>
      <p>아래 버튼을 눌러 카카오톡 단체방에<br>입장해주세요. 교육 일정을 안내드릴게요.</p>
      <a href="https://open.kakao.com/o/gCgbSSDi" target="_blank" class="kakao-btn" id="kakao-btn">카카오톡 단체방 입장하기</a>
    </div>
  </div>
</div>
<script>
  const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbznd-1rq2duz1My_kak-LE1-xCg_NRSc97VUmiposPDHIB1auQnRz2il79Q02PxHnsY/exec";
  const form = document.getElementById('signup-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const purposeChecks = document.querySelectorAll('#f-purpose input:checked');
    const purpose = Array.from(purposeChecks).map(c => c.value).join(', ');
    if(!name || !phone || purposeChecks.length === 0){
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = '전송 중...';
    const payload = { name: name, phone: phone, purpose: purpose, timestamp: new Date().toISOString() };
    fetch(SHEET_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    }).catch(function(err){ console.error('Sheet save failed', err); });
    if(typeof gtag === 'function'){
      gtag('event', 'signup_complete', { event_category: 'ear_reflexer_zoom', purpose: purpose });
    }
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('success-state').style.display = 'block';
  });
</script>
</body>
</html>
